services:
  fuseki:
    image: secoresearch/fuseki:latest
    container_name: voicevox-sparql
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: admin
      FUSEKI_DATASET_1: voicevox
    volumes:
      - fuseki-data:/fuseki/databases
    restart: unless-stopped

volumes:
  fuseki-data:
